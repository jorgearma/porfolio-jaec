# ─────────────────────────────────────────────────────────────
# nginx config inside the container.
# El nginx del VPS hace de reverse-proxy contra 127.0.0.1:<port>.
# ─────────────────────────────────────────────────────────────
server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip
    gzip               on;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_min_length    1024;
    gzip_vary          on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # security headers (portafolio público, sin secretos)
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header X-Content-Type-Options  "nosniff"    always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;

    # long cache for assets, short for html
    location ~* \.(css|js|woff2?|ttf|otf|eot|ico|png|jpe?g|webp|svg|avif)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=300";
    }

    # light 404
    error_page 404 /index.html;
}
